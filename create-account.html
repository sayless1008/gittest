<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="create-account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://googleapis.com">
    <link rel="stylesheet" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Create an account with Mediociate</title>
</head>
<body>
    <div class="full-block">
        <div class="block">
            <h2>Welcome to</h2>
            <img src="/img/Green with tag.png" alt="">
            <h1>Your first step toward a <br> better healthcare experience.</h1>
            <p>We just need a few details to get the process started.<br> We’ll also make sure you’re covered by insurance!</p>
        </div>
        <div class="block1">
            <form>
                <img src="/img/border-icon-green.png" alt="">
                <h4>Create an account</h4>
                <p>To get started, you need to create an account</p>
                <label for="name">First name</label><br>
                <input type="text" name="" id="name"><br>
                <label for="last">Last name</label><br>
                <input type="text" name="" id="last"><br>
                <label for="email">Email Address</label><br>
                <input type="email" name="" id="email"><br>
                <label for="num">Password</label><br>
                <input type="text" name="" id="num"><br>
                <label for="pass">Confirm Password</label><br>
                <input type="text" name="" id="Pass"><br>
                <a href="code1.html">Sign Up</a>
            </form>
        </div>
       </div>
</body>
</html>
